name: Release

# Builds small, MODEL-LESS installers for all three platforms and publishes them on
# tags. The ONNX models (~1.3 GB each) are NOT in the installers — they are a
# separately-versioned set of GitHub release assets (tag `models-v1`), pinned by
# SHA-256 in tools/fetch_models.{sh,ps1}. Each installer carries that fetch script;
# the user (or the installer) runs it once to pull the models into the bundle's
# Contents/Resources. This keeps every asset well under GitHub's 2 GB limit.
#
# To (re)publish the models, use the `publish-models` workflow / a one-shot upload of
# the validated exports; bump to models-v2 and update the pinned checksums when the
# models change.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the installers"
        default: "0.5.0"
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (CoreML, arm64)
            platform: macos
          - os: ubuntu-latest   # Linux x86-64 (CUDA)
            platform: linux
            # Build inside AlmaLinux 8 (glibc 2.28) so the .ofx loads on the VFX-standard
            # RHEL/Rocky/Alma 8 hosts. ubuntu-latest links GLIBC_2.34 symbols that EL8 lacks.
            container: quay.io/pypa/manylinux_2_28_x86_64
          - os: windows-2022    # Windows x64 (CUDA) — pinned for the VS 2022 generator
            platform: windows
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}   # empty for macOS/Windows (host); AlmaLinux 8 for Linux
    steps:
      - uses: actions/checkout@v4

      # --- Configure & build the MODEL-LESS bundle (no -DDA3_*_MODEL_FILE) ---
      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          cmake -S . -B build -DDA3_WITH_ONNX=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target DepthAnything3 -j3

      - name: Build (Linux — manylinux_2_28 / glibc 2.28 for EL8 compatibility)
        if: matrix.platform == 'linux'
        run: |
          set -euo pipefail
          # Container runs as root; avoid git's "dubious ownership" on the checkout.
          git config --global --add safe.directory '*'
          # manylinux_2_28 ships cmake, git, patchelf and a modern gcc-toolset on PATH
          # (all linking glibc 2.28); ensure xz is present for the .tar.xz packaging step.
          command -v xz >/dev/null 2>&1 || dnf install -y xz || yum install -y xz
          echo "toolchain:"; cmake --version | head -1; g++ --version | head -1; patchelf --version; git --version
          cmake -S . -B build -DDA3_WITH_ONNX=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target DepthAnything3 -j3
          # Guard: fail the release if the .ofx needs a glibc newer than EL8's 2.28.
          OFX=build/DepthAnything3.ofx.bundle/Contents/Linux-x86-64/DepthAnything3.ofx
          maxg=$(grep -ao 'GLIBC_[0-9.]*' "$OFX" | sed 's/GLIBC_//' | sort -V | tail -1)
          echo "max GLIBC required by .ofx: $maxg"
          if [ "$(printf '%s\n2.28\n' "$maxg" | sort -V | tail -1)" != "2.28" ]; then
            echo "::error::.ofx requires GLIBC_$maxg > 2.28 — not EL8/VFX-platform compatible"; exit 1
          fi
          echo "OK: glibc floor $maxg <= 2.28 (loads on RHEL/Rocky/Alma 8+)"
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DDA3_WITH_ONNX=ON
          cmake --build build --config Release --target DepthAnything3 --parallel

      # --- Package per platform, carrying the fetch-models script + a README ---
      - name: Package (macOS .pkg)
        if: matrix.platform == 'macos'
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          V="${VERSION#v}"; [ -n "$V" ] || V="0.5.0"
          # Pass fetch_models.sh via --extra-contents so make_pkg.sh injects it into
          # the bundle AFTER code-signing (a loose file in Contents/ breaks the sign).
          packaging/make_pkg.sh --bundle build/DepthAnything3.ofx.bundle \
            --out "dist/DepthAnything3-$V-macos-arm64.pkg" --version "$V" \
            --extra-contents tools/fetch_models.sh

      - name: Package (Linux .tar.xz)
        if: matrix.platform == 'linux'
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          V="${VERSION#v}"; [ -n "$V" ] || V="0.5.0"
          cp tools/fetch_models.sh build/DepthAnything3.ofx.bundle/Contents/fetch_models.sh
          mkdir -p dist
          tar -C build -caf "dist/DepthAnything3-$V-linux-x86_64.tar.xz" DepthAnything3.ofx.bundle

      - name: Package (Windows .zip)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          $v = "${env:VERSION}" -replace '^v',''
          if (-not $v) { $v = "0.5.0" }
          Copy-Item tools/fetch_models.ps1 build/DepthAnything3.ofx.bundle/Contents/fetch_models.ps1
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/DepthAnything3.ofx.bundle `
            -DestinationPath "dist/DepthAnything3-$v-windows-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create/attach release (installers + fetch scripts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Publish the platform installers plus the standalone fetch scripts so
          # users can pull the models. Models themselves live under the `models-v1`
          # tag (published separately), pinned by checksum inside the scripts.
          gh release create "${GITHUB_REF_NAME}" \
            dist/* tools/fetch_models.sh tools/fetch_models.ps1 \
            --generate-notes --title "${GITHUB_REF_NAME}" \
            --notes "Model-less installers. After installing, run the bundled
          fetch_models script (or the standalone one attached here) to download the
          ONNX models into the plugin's Contents/Resources. See docs/HOST_COMPATIBILITY.md." \
          || gh release upload "${GITHUB_REF_NAME}" \
               dist/* tools/fetch_models.sh tools/fetch_models.ps1 --clobber
