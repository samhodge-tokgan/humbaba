name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the .pkg"
        default: "0.1.0"
  push:
    tags: ["v*"]

jobs:
  # Export the dynamic-resolution ONNX model on Linux (heavy), share as an artifact.
  export-model:
    name: Export model
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + DA3
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2" torchvision --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r tools/requirements.txt
          git clone --depth 1 https://github.com/ByteDance-Seed/Depth-Anything-3 "$RUNNER_TEMP/da3"
          pip install -e "$RUNNER_TEMP/da3" --no-deps
      - name: Export dynamic ONNX
        run: |
          python tools/export_onnx.py --height 490 --width 490 \
            --output build/model/DA3METRIC-LARGE.onnx
      - uses: actions/upload-artifact@v4
        with:
          name: da3-model
          path: build/model/DA3METRIC-LARGE.onnx
          if-no-files-found: error

  # Export the AnyCalib field net (dynamic ONNX) for the Lens Distortion estimator.
  export-anycalib:
    name: Export AnyCalib
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + AnyCalib
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2" torchvision --extra-index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnxruntime onnxscript "numpy<2"
          pip install "git+https://github.com/javrtg/AnyCalib"
      - name: Export dynamic ONNX
        run: python tools/export_anycalib.py --output build/model/anycalib_dist.onnx
      - uses: actions/upload-artifact@v4
        with:
          name: anycalib-model
          path: build/model/anycalib_dist.onnx
          if-no-files-found: error

  # Build the plugin with the models bundled and produce the .pkg installer.
  package:
    name: Build .pkg
    needs: [export-model, export-anycalib]
    runs-on: macos-14
    permissions:
      contents: write   # create/upload the GitHub Release on tags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: da3-model
          path: model
      - name: Fetch MoGe model (pre-exported ONNX, MIT)
        run: |
          curl -fL -o model/moge-2-vitb.onnx \
            "https://huggingface.co/Ruicheng/moge-2-vitb-normal-onnx/resolve/main/model.onnx"
      - uses: actions/download-artifact@v4
        with:
          name: anycalib-model
          path: model
      - name: Configure & build (all models bundled)
        run: |
          cmake -S . -B build -DDA3_WITH_ONNX=ON -DCMAKE_BUILD_TYPE=Release \
            -DDA3_MODEL_FILE="$PWD/model/DA3METRIC-LARGE.onnx" \
            -DDA3_MOGE_MODEL_FILE="$PWD/model/moge-2-vitb.onnx" \
            -DDA3_ANYCALIB_MODEL_FILE="$PWD/model/anycalib_dist.onnx"
          cmake --build build -j3
          rm -f build/DepthAnything3.ofx.bundle/Contents/Frameworks/libonnxruntime.1.27.1.dylib
      - name: Build .pkg (ad-hoc signed)
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          V="${VERSION#v}"; [ -n "$V" ] || V="0.1.0"
          packaging/make_pkg.sh --bundle build/DepthAnything3.ofx.bundle \
            --out "dist/DepthAnything3-$V.pkg" --version "$V"
      - uses: actions/upload-artifact@v4
        with:
          name: DepthAnything3-pkg
          path: dist/*.pkg
          if-no-files-found: error
      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${GITHUB_REF_NAME}" dist/*.pkg --generate-notes || \
             gh release upload "${GITHUB_REF_NAME}" dist/*.pkg --clobber
        env:
          GH_TOKEN: ${{ github.token }}
