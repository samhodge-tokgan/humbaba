name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Skeleton CI. Real build/test jobs are added with their milestones:
#   - M1 adds model export + ONNX validation (see model.yml)
#   - M2 adds the CMake plugin build (universal .ofx bundle)

jobs:
  sanity:
    name: Repo sanity
    runs-on: macos-14   # Apple Silicon runner (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          set -euo pipefail
          for f in LICENSE README.md docs/DEVELOPMENT.md .gitignore; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Repo sanity OK"

      - name: Confirm LICENSE is Apache-2.0
        run: grep -q "Apache License" LICENSE && grep -q "Version 2.0" LICENSE

  build:
    name: Build universal .ofx bundle
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Configure & build (universal arm64+x86_64)
        run: |
          cmake -S . -B build -DDA3_UNIVERSAL=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j3

      - name: Verify bundle, architectures and OFX entry points
        run: |
          set -euo pipefail
          BIN=build/DepthAnything3.ofx.bundle/Contents/MacOS/DepthAnything3.ofx
          test -f build/DepthAnything3.ofx.bundle/Contents/Info.plist
          test -f "$BIN"
          echo "== arch =="; lipo -info "$BIN"
          lipo -info "$BIN" | grep -q arm64
          lipo -info "$BIN" | grep -q x86_64
          echo "== OFX symbols =="; nm -gU "$BIN" | grep -E 'OfxGetPlugin|OfxGetNumberOfPlugins'
          nm -gU "$BIN" | grep -q OfxGetPlugin

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: DepthAnything3-ofx-bundle
          path: build/DepthAnything3.ofx.bundle
          if-no-files-found: error
