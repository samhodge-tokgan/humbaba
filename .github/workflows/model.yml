name: Model export & validate

on:
  workflow_dispatch:
    inputs:
      height:
        description: "Export height (multiple of 14)"
        default: "504"
      width:
        description: "Export width (multiple of 14)"
        default: "504"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - ".github/workflows/model.yml"
  pull_request:
    paths:
      - "tools/**"
      - ".github/workflows/model.yml"

# Runs on Linux CPU: the export/validate path is platform-independent
# (CoreML is only used later at plugin runtime). Produces the .onnx artifact.
jobs:
  export-validate:
    name: Export DA3METRIC-LARGE → ONNX and validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HEIGHT: ${{ github.event.inputs.height || '504' }}
      WIDTH: ${{ github.event.inputs.width || '504' }}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      # Optional: private/gated model access. DA3METRIC-LARGE is public Apache-2.0.
      HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HuggingFace hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-da3metric-large-v1

      - name: Install PyTorch (CPU) + ONNX tooling
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2" torchvision --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r tools/requirements.txt

      - name: Install Depth Anything 3 (from source)
        run: |
          git clone --depth 1 https://github.com/ByteDance-Seed/Depth-Anything-3 "$RUNNER_TEMP/da3"
          # Editable install of the package (pulls its own runtime deps).
          pip install -e "$RUNNER_TEMP/da3"

      - name: Export ONNX (FP16, keep FP32 for validation/int8)
        run: |
          python tools/export_onnx.py \
            --height "$HEIGHT" --width "$WIDTH" \
            --output build/model/DA3METRIC-LARGE.onnx --fp16 --keep-fp32

      - name: Validate export fidelity (gate)
        run: |
          python tools/validate_onnx.py \
            --onnx build/model/DA3METRIC-LARGE.onnx \
            --height "$HEIGHT" --width "$WIDTH" \
            --max-rel-error 0.03 --min-corr 0.999

      - name: Show model sizes
        if: always()
        run: ls -lh build/model/ || true

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: da3metric-large-onnx
          path: |
            build/model/DA3METRIC-LARGE.onnx
            build/model/DA3METRIC-LARGE.onnx.json
            build/model/validation.json
          if-no-files-found: error
          retention-days: 14
